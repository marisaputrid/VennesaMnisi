<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unbothered, collected, and holdin’ it down like a pro 🐻💼</title>

<style>
:root {
  --primary-bg: #101014;
  --footer-bg: #18181e;
  --text-main: #fff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  background: var(--primary-bg);
  color: var(--text-main);
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* ========================= */
/* BANNER ATAS FIXED */
/* ========================= */
.top-ad {
  position: fixed;
  top: 80px;
  left: 0;
  width: 100%;
  text-align: center;
  background: var(--footer-bg);
  padding: 6px 0;
  z-index: 9999;
  border-radius: 8px;
  min-height: 50px;
}

/* ========================= */
/* CONTAINER */
/* ========================= */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 150px;
  padding-bottom: 160px; /* penting supaya gak ketutup banner bawah */
}

/* ========================= */
/* VIDEO */
/* ========================= */
video {
  height: 95vh;
  width: auto;
  max-width: 100%;
  object-fit: contain;
  background: #000;
  position: relative;
  z-index: 1;
}

/* Hilangkan fullscreen button */
video::-webkit-media-controls-fullscreen-button {
  display: none !important;
}

/* ========================= */
/* BANNER BAWAH FIXED */
/* ========================= */
.bottom-ad {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  text-align: center;
  background: var(--footer-bg);
  padding: 10px 0;
  z-index: 9999;
  min-height: 60px;
}

/* DEBUG (hapus kalau sudah jalan) */
/*
.bottom-ad {

*/
</style>
</head>

<!-- ========================= -->

<!-- FORCE DISABLE FULLSCREEN -->

  if (document.fullscreenElement) {
    document.exitFullscreen();
  }
});
